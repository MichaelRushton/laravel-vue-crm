services:
    app:
        build:
            context: .
            args:
                uid: ${uid:-1000}
                gid: ${gid:-1000}
        image: michaelrushton/${COMPOSE_PROJECT_NAME}/app
        container_name: ${COMPOSE_PROJECT_NAME}-app
        user: ${uid:-1000}:${gid:-1000}
        depends_on:
            db:
                condition: service_healthy
        ports:
            - ${VITE_PORT:-5173}:5173
        volumes:
            - ..:/var/www/html
        profiles:
            - app
            - install
    server:
        image: nginx:alpine-slim
        container_name: ${COMPOSE_PROJECT_NAME}-server
        ports:
            - ${APP_PORT:-80}:80
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ../public:/var/www/html/public
        profiles:
            - app
    db:
        image: postgres:18-alpine
        container_name: ${COMPOSE_PROJECT_NAME}-db
        ports:
            - ${DB_PORT:-5432}:5432
        environment:
            PGUSER: ${DB_USERNAME}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_HOST_AUTH_METHOD: trust
        healthcheck:
            test: ["CMD", "pg_isready", "-d", "${DB_DATABASE}"]
            interval: 1s
        volumes:
            - db-data:/var/lib/postgresql/data
        profiles:
            - app
            - install
    db-testing:
        image: postgres:18-alpine
        container_name: ${COMPOSE_PROJECT_NAME}-db-testing
        ports:
            - ${DB_TESTING_PORT:-5433}:5432
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_HOST_AUTH_METHOD: trust
        volumes:
            - db-testing-data:/var/lib/postgresql/data
        profiles:
            - app
    mailpit:
        image: axllent/mailpit:latest
        container_name: ${COMPOSE_PROJECT_NAME}-mailpit
        ports:
            - ${MAILPIT_PORT:-1025}:1025
            - ${MAILPIT_DASHBOARD_PORT:-8025}:8025
        profiles:
            - app
    redis:
        image: redis:alpine
        container_name: ${COMPOSE_PROJECT_NAME}-redis
        ports:
            - ${REDIS_PORT:-6379}:6379
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 1s
        volumes:
            - redis-data:/data
        profiles:
            - app
    horizon:
        build:
            context: .
            args:
                uid: ${uid:-1000}
                gid: ${gid:-1000}
        image: michaelrushton/${COMPOSE_PROJECT_NAME}/horizon
        container_name: ${COMPOSE_PROJECT_NAME}-horizon
        depends_on:
            redis:
                condition: service_healthy
            db:
                condition: service_healthy
        volumes:
            - ..:/var/www/html
        command: php artisan horizon
        profiles:
            - app
volumes:
    db-data:
    db-testing-data:
    redis-data:
